<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0fa 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Confetti Animation */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 25px;
            background-color: #f2d74e;
            top: -20px;
            opacity: 0.8;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                top: -20px;
            }
            100% {
                transform: translateY(105vh) rotate(720deg);
            }
        }

        /* Main Container */
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }

        .wishes {
            font-size: 1.1rem;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Photo Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .gallery-item {
            position: relative;
            width: 100%;
            padding-bottom: 120px; /* Forces uniform size on mobile */
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 3px solid #fff;
            transition: transform 0.3s ease;
        }

        .gallery-item:active {
            transform: scale(0.98);
        }

        /* Highlight the main featured landscape/mirror selfie */
        .gallery-item.featured {
            grid-column: span 2;
            padding-bottom: 130%;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Music Button Styling */
        .music-btn {
            background: linear-gradient(135deg, #ff4081 0%, #e040fb 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
            transition: transform 0.2s;
            outline: none;
            margin-top: 10px;
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        /* Small Footer decoration */
        .footer-note {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="confetti-container" id="confetti-wrapper"></div>

    <div class="container">
        <h1>Happy Birthday! 🎂✨</h1>
        
        <p class="wishes">
            Wishing you a beautiful year ahead filled with love, laughter, and countless happy memories together! May every day bring you closer to your dreams. ❤️
        </p>

        <div class="gallery">
            <div class="gallery-item featured">
                <img src="1000003243.jpg" alt="Beautiful Moment 1">
            </div>
            <div class="gallery-item">
                <img src="1000003246.jpg" alt="Beautiful Moment 2">
            </div>
            <div class="gallery-item">
                <img src="1000003249.jpg" alt="Beautiful Moment 3">
            </div>
            <div class="gallery-item">
                <img src="1000003244.jpg" alt="Beautiful Moment 4">
            </div>
            <div class="gallery-item">
                <img src="1000003242.jpg" alt="Beautiful Moment 5">
            </div>
            <div class="gallery-item">
                <img src="1000003245.jpg" alt="Beautiful Moment 6">
            </div>
            <div class="gallery-item">
                <img src="1000003240.jpg" alt="Beautiful Moment 7">
            </div>
            <div class="gallery-item">
                <img src="1000003248.jpg" alt="Beautiful Moment 8">
            </div>
        </div>

        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 Play Birthday Music</button>
        <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

        <p class="footer-note">Made with ❤️ for your special day</p>
    </div>

    <script>
        // Dynamically generate falling confetti
        function createConfetti() {
            const container = document.getElementById('confetti-wrapper');
            const colors = ['#ff4081', '#e040fb', '#00e5ff', '#ffea00', '#76ff03', '#ff6e40'];
            
            for (let i = 0; i < 75; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Randomize positions, colors and speeds for realistic falling
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 5) + 's';
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = Math.random() * 15 + 10 + 'px';
                
                container.appendChild(confetti);
            }
        }

        // Handle simple music play/pause functionality
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            
            if (music.paused) {
                music.play().catch(e => console.log("Audio play blocked until interaction."));
                btn.textContent = "⏸️ Pause Music";
            } else {
                music.pause();
                btn.textContent = "🎵 Play Birthday Music";
            }
        }

        // Run confetti generation on page load
        window.addEventListener('DOMContentLoaded', createConfetti);
    </script>
</body>
</html>
